<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="referrer" content="no-referrer" />
  <title>Alteração de Palavras</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    html, body { height: 100%; }
    body{
      margin:0;
      padding:0;
      background-color:#f0f0f0;
      font-family: Arial, sans-serif;

      /* IMPORTANTE: não travar o scroll no iOS */
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    iframe{
      width:100%;
      border:none;
      display:none; /* esconde até carregar */
    }

    #loading{
      position:fixed;
      inset:0;                    /* melhor que top/left/width/height no iOS */
      min-height: 100dvh;         /* viewport dinâmica (teclado/toolbar) */
      background:rgba(255,255,255,0.92);
      display:flex;
      flex-direction:column;
      gap:12px;
      justify-content:center;
      align-items:center;
      z-index:1000;
      color:#2d3436;
      font-family:'Poppins', sans-serif;
      padding: 24px;
      text-align:center;
    }

    #loading .msg{
      font-size:16px;
      line-height:1.35;
      max-width: 520px;
    }

    #error{
      display:none;
      padding: 20px;
      font-family:'Poppins', sans-serif;
      color:#111827;
    }
    #error h1{
      margin:0 0 10px 0;
      font-size:20px;
    }
    #error p{
      margin:0;
      font-size:14px;
      color:#374151;
      line-height:1.4;
    }
  </style>
</head>

<body>
  <div id="loading">
    <i class="fas fa-spinner fa-spin" aria-hidden="true"></i>
    <div class="msg">Carregando dados... Por favor, aguarde</div>
  </div>

  <div id="error">
    <h1>Erro</h1>
    <p id="errorMsg"></p>
  </div>

  <iframe id="appsScriptFrame" frameborder="0" referrerpolicy="no-referrer"></iframe>

  <script>
  function getQueryParam(param) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(param);
  }

  // Lê hash no formato: #pe/<idCurto>
  function parseHashRoute() {
    const raw = (window.location.hash || '').trim();
    if (!raw || raw === '#') return null;

    const h = raw.startsWith('#') ? raw.slice(1) : raw;
    const cleaned = h.startsWith('/') ? h.slice(1) : h;

    const parts = cleaned.split('/').filter(Boolean);
    if (parts.length < 2) return null;

    const mode = String(parts[0] || '').toLowerCase();
    const token = String(parts[1] || '').trim();

    if (mode !== 'pe') return null;

    return { mode, token };
  }

  // COLE AQUI O ID DA SUA WEB APP (APPS SCRIPT)
  const WEB_APP_ID = 'AKfycbyBwcYtRHTovbt-WLr_bGQvY5UZax8kppBOVwy91NgWSzJViiPh_Ek6HM_K7jolLfj3eA';

  function isShortHexId(v) {
    return /^[0-9a-f]{16}$/i.test(String(v || '').trim());
  }

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    const err = document.getElementById('error');
    document.getElementById('errorMsg').textContent = msg;
    err.style.display = 'block';
  }

  // PERSONALIZAVEL:
  //   https://01mix.github.io/02/index.html?k=<idCurto>
  //
  // PRONTA_ENTREGA com portão:
  //   https://01mix.github.io/02/index.html#pe/<idCurto>

  const hashRoute = parseHashRoute();
  const kFromQuery = String(getQueryParam('k') || '').trim();

  const token = hashRoute ? hashRoute.token : kFromQuery;
  const mode = hashRoute ? hashRoute.mode : 'p';

  if (!token) {
    showError('Identificador ausente na URL. Verifique se você abriu o link correto.');
  } else if (!isShortHexId(token)) {
    showError('Identificador inválido. Verifique se você abriu o link correto.');
  } else if (!WEB_APP_ID || WEB_APP_ID === 'COLE_AQUI_O_ID_DA_IMPLANTACAO') {
    showError('Configuração incompleta: WEB_APP_ID não foi definido no GitHub Pages.');
  } else {
    const iframe = document.getElementById('appsScriptFrame');

    iframe.style.height = '100dvh';

    const base = `https://script.google.com/macros/s/${WEB_APP_ID}/exec`;
    const qs = new URLSearchParams();

    // Internamente, o Projeto B continua recebendo "token"
    qs.set('token', token);
    if (mode === 'pe') qs.set('page', 'pe');

    const urlAppsScript = `${base}?${qs.toString()}`;
    iframe.src = urlAppsScript;

    iframe.onload = function() {
      document.getElementById('loading').style.display = 'none';
      iframe.style.display = 'block';
    };

    window.addEventListener('message', function(event) {
      if (!event || !event.data) return;

      const origin = String(event.origin || '');
      const okOrigin =
        origin === 'https://script.google.com' ||
        origin === 'https://script.googleusercontent.com';

      if (!okOrigin) return;

      const h = event.data.height;
      if (typeof h === 'number' && isFinite(h) && h > 200 && h < 40000) {
        iframe.style.height = h + 'px';
      }
    });

    window.addEventListener('hashchange', function() {
      const r = parseHashRoute();
      if (!r) return;
      if (!isShortHexId(r.token)) return;

      const qs2 = new URLSearchParams();
      qs2.set('token', r.token);
      if (r.mode === 'pe') qs2.set('page', 'pe');

      iframe.src = `${base}?${qs2.toString()}`;
      document.getElementById('loading').style.display = 'flex';
      iframe.style.display = 'none';
    });
  }
</script>
</body>
</html>
